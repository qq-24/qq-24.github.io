<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 图片解析器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; overflow: hidden; height: 100vh; }
body.drag-mode { user-select: none; }

#drop-zone {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 100; background: #1a1a2e;
}
#drop-zone.hidden { display: none; }
#drop-zone .hint { border: 3px dashed #555; border-radius: 20px; padding: 80px 120px; text-align: center; font-size: 20px; color: #aaa; }
#drop-zone.dragover .hint { border-color: #6ea8fe; color: #6ea8fe; }
#drop-zone .hint p:last-child { font-size: 14px; margin-top: 12px; color: #666; }

/* 模式选择 */
#mode-select {
  display: none; position: absolute; inset: 0; z-index: 100; background: #1a1a2e;
  align-items: center; justify-content: center;
}
#mode-select.active { display: flex; }
.mode-select-inner { text-align: center; }
.mode-select-inner h2 { color: #ccc; margin-bottom: 28px; font-size: 22px; font-weight: 400; }
.mode-cards { display: flex; gap: 20px; }
.mode-card {
  width: 260px; padding: 32px 24px; background: #2a2a3e; border: 2px solid #444;
  border-radius: 14px; cursor: pointer; transition: all 0.15s;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.mode-card:hover { border-color: #888; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
.mode-card.primary { border-color: #6a5acd; background: #2d2850; }
.mode-card.primary:hover { border-color: #9a8aff; box-shadow: 0 6px 24px rgba(106,90,205,0.3); }
.mode-icon { font-size: 40px; }
.mode-title { font-size: 17px; font-weight: bold; color: #e0e0e0; }
.mode-desc { font-size: 13px; color: #999; line-height: 1.5; }

/* 手机适配 */
@media (max-width: 600px) {
  #drop-zone .hint { padding: 50px 30px; font-size: 17px; }
  .mode-cards { flex-direction: column; }
  .mode-card { width: 100%; max-width: 300px; padding: 24px 20px; }
  #summary-box { padding: 0; }
  #summary-box textarea { font-size: 12px; border-radius: 0; }
  #summary-overlay { padding: 8px; }
}

#viewport { position: absolute; inset: 0; overflow: hidden; display: none; cursor: grab; }
#viewport.active { display: block; }
#viewport.dragging { cursor: grabbing; }
body.select-mode #viewport { cursor: default; }

#world { position: absolute; transform-origin: 0 0; }

/* 分组框 */
.group-box { position: absolute; border: 2px solid; border-radius: 8px; pointer-events: none; }
.group-title { position: absolute; top: -30px; left: 8px; font-weight: bold; white-space: nowrap; }

/* 节点 */
.node {
  position: absolute; background: #2b2b3d; border: 1.5px solid #555;
  border-radius: 6px; overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
body.drag-mode .node { pointer-events: auto; cursor: pointer; }
body.drag-mode .node-header { cursor: pointer; }
body.move-mode .node { pointer-events: auto; cursor: grab; }
body.move-mode .node-header { cursor: grab; }
body.select-mode .node { pointer-events: auto; cursor: text; }
body.select-mode .node-header { cursor: pointer; }

.node.selected { border-color: #fff; box-shadow: 0 0 14px rgba(255,255,255,0.35); z-index: 10; }
.node.collapsed { border-radius: 14px; }

/* 禁用节点 */
.node.muted::after {
  content: '已禁用'; position: absolute; inset: 0; border-radius: 5px;
  background: rgba(100, 40, 160, 0.6); display: flex; align-items: center;
  justify-content: center; color: #dbb0ff; font-size: 16px; font-weight: bold;
  letter-spacing: 6px; text-shadow: 0 2px 6px rgba(0,0,0,0.5);
  pointer-events: none; z-index: 5;
}

.node-header {
  padding: 5px 10px; font-weight: bold; font-size: 13px;
  color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.7);
  display: flex; justify-content: space-between; align-items: center; gap: 8px;
  white-space: nowrap; overflow: hidden;
}
.node.collapsed .node-header { border-radius: 13px; }
.node-header .nid { opacity: 0.6; font-size: 10px; font-weight: normal; }

/* 节点内容区 */
.node-content { display: flex; flex-direction: column; }

/* 端口行：贴边 */
.port-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 1px 0; min-height: 18px; position: relative;
}
.port-left, .port-right { display: flex; align-items: center; font-size: 12px; white-space: nowrap; }
.port-left { padding-left: 2px; color: #f0c874; }
.port-right { padding-right: 2px; color: #c4a8ff; }
/* 端口圆点贴边 */
.port-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  border: 1.5px solid; display: inline-block;
}
.port-dot.input { border-color: #f0c874; background: #f0c87444; margin-right: 4px; }
.port-dot.output { border-color: #c4a8ff; background: #c4a8ff44; margin-left: 4px; }
.port-dot.connected.input { background: #f0c874; }
.port-dot.connected.output { background: #c4a8ff; }

/* widget 参数区 */
.widgets { padding: 2px 8px 4px; border-top: 1px solid #3a3a50; }
.widget-row {
  display: flex; justify-content: space-between; padding: 2px 0;
  border-bottom: 1px solid #333; gap: 8px; align-items: baseline;
}
.widget-row:last-child { border-bottom: none; }
.wk { color: #7ab0ff; flex-shrink: 0; }
.wv { color: #b8e6b8; text-align: right; word-break: break-all; line-height: 1.4; white-space: pre-wrap; }

/* 连线在节点下面 */
#links-svg { position: absolute; top: 0; left: 0; pointer-events: none; overflow: visible; z-index: -1; }
#links-svg path { transition: opacity 0.15s, stroke-width 0.15s; }
#links-svg.has-selection path { opacity: 0.06; stroke-width: 1.5; }
#links-svg.has-selection path.highlight { opacity: 1; stroke-width: 3.5; z-index: 999; }

#toolbar {
  position: fixed; top: 10px; right: 10px; z-index: 200; display: none;
  background: #2a2a3e; border-radius: 8px; padding: 6px; gap: 4px;
  flex-direction: column; box-shadow: 0 2px 8px rgba(0,0,0,0.5);
}
#toolbar.active { display: flex; }
#toolbar button {
  background: #3a3a50; color: #ddd; border: none; border-radius: 4px;
  padding: 5px 12px; cursor: pointer; font-size: 12px; pointer-events: auto;
}
#toolbar button:hover { background: #505068; }
#toolbar button.active { background: #6a5acd; color: #fff; }

#info {
  position: fixed; bottom: 10px; left: 10px; z-index: 200; display: none;
  background: #2a2a3ecc; border-radius: 6px; padding: 6px 12px; font-size: 12px; color: #aaa;
}
#info.active { display: block; }

/* 摘要全屏 */
#summary-overlay {
  display:none; position:fixed; inset:0; z-index:300; background:#1a1a2e;
  flex-direction:column; padding:16px;
}
#summary-overlay.active { display:flex; }
#summary-box {
  flex:1; display:flex; flex-direction:column; gap:8px;
  max-width:960px; width:100%; margin:0 auto;
}
#summary-box textarea {
  flex:1; background:#2a2a3e; color:#e0e0e0; border:1px solid #444; border-radius:6px;
  padding:12px; font-family:'Consolas','Courier New',monospace; font-size:13px;
  line-height:1.5; resize:none;
}
#summary-box .btns { display:flex; gap:8px; justify-content:flex-end; }
#summary-box .btns button {
  background:#3a3a50; color:#ddd; border:none; border-radius:4px;
  padding:8px 18px; cursor:pointer; font-size:13px;
}
#summary-box .btns button:hover { background:#505068; }
#summary-box .btns button.primary { background:#6a5acd; color:#fff; }
</style>
</head>
<body class="drag-mode">

<!-- 拖放区 -->
<div id="drop-zone">
  <a href="../index.html" style="position:absolute;top:12px;left:12px;z-index:110;color:#aaa;text-decoration:none;font-size:14px;background:#2a2a3e;padding:6px 14px;border-radius:6px;display:flex;align-items:center;gap:4px;">← 返回主页</a>
  <div class="hint">
    <p>🖼️ 拖入 AI 生成的图片（PNG / WebP）或工作流 JSON</p>
    <p>支持 ComfyUI 和 WebUI (A1111) 格式</p>
  </div>
</div>

<!-- 模式选择（拖入文件后显示） -->
<div id="mode-select">
  <div class="mode-select-inner">
    <h2>选择查看方式</h2>
    <div class="mode-cards">
      <div class="mode-card primary" onclick="doShowText()">
        <div class="mode-icon">📄</div>
        <div class="mode-title">工作流文本化</div>
        <div class="mode-desc">将工作流转为结构化文本，可直接复制给 AI 分析生成过程</div>
      </div>
      <div class="mode-card" onclick="doShowGraph()">
        <div class="mode-icon">🔗</div>

      </div>
    </div>
    <div style="margin-top:20px"><button onclick="resetToDropZone()" style="background:none;border:1px solid #555;color:#999;padding:8px 20px;border-radius:4px;cursor:pointer;font-size:13px">↩ 重新选图</button></div>
  </div>
</div>

<div id="viewport">
  <div id="world">
    <svg id="links-svg"></svg>
  </div>
</div>

<div id="toolbar">
  <button class="active" id="btn-drag" onclick="setMode('drag')">🖐 拖拽</button>
  <button id="btn-move" onclick="setMode('move')">✥ 移动节点</button>
  <button id="btn-select" onclick="setMode('select')">📋 选字</button>

</div>

    </div>

</div>

<script>
let currentMode = 'drag';
function setMode(mode) {
  currentMode = mode;
  document.body.className = mode + '-mode';
  document.getElementById('btn-drag').classList.toggle('active', mode === 'drag');
  document.getElementById('btn-move').classList.toggle('active', mode === 'move');
  document.getElementById('btn-select').classList.toggle('active', mode === 'select');
}

/* ===== PNG 解析 ===== */
function parseWebpMeta(buf) {
  const data = new Uint8Array(buf), res = {};
  for (let i = 12; i < data.length - 8; i++) {
    if (data[i]===0x45 && data[i+1]===0x58 && data[i+2]===0x49 && data[i+3]===0x46) {
      const size = data[i+4] | (data[i+5]<<8) | (data[i+6]<<16) | (data[i+7]<<24);
      const exif = new TextDecoder().decode(data.slice(i+8, i+8+size));
      const wm = exif.indexOf('Workflow:'), pm = exif.indexOf('Prompt:');
      if (wm >= 0 && pm > wm) { res.workflow = exif.slice(wm+9, exif.lastIndexOf('}', pm)+1); res.prompt = exif.slice(pm+7, exif.lastIndexOf('}')+1); }
      else if (wm >= 0) { res.workflow = exif.slice(wm+9, exif.lastIndexOf('}')+1); }
      else if (pm >= 0) { res.prompt = exif.slice(pm+7, exif.lastIndexOf('}')+1); }
      break;
    }
  }
  return res;
}

function parsePngMeta(buf) {
  const view = new DataView(buf), res = {};
  let off = 8;
  while (off < buf.byteLength) {
    const len = view.getUint32(off);
    const type = String.fromCharCode(...new Uint8Array(buf, off + 4, 4));
    if (type === 'tEXt' || type === 'iTXt') {
      const data = new Uint8Array(buf, off + 8, len);
      const ni = data.indexOf(0);
      const key = new TextDecoder().decode(data.slice(0, ni));
      let val;
      if (type === 'tEXt') {
        val = new TextDecoder().decode(data.slice(ni + 1));
      } else {
        let p = ni + 3;
        p = data.indexOf(0, p) + 1;
        p = data.indexOf(0, p) + 1;
        val = new TextDecoder('utf-8').decode(data.slice(p));
      }
      res[key] = val;
    }
    off += 12 + len;
  }
  return res;
}

// 修复非法 JSON（NaN, Infinity, -Infinity, 尾逗号等）
function safeJsonParse(str) {
  const fixed = str
    .replace(/\bNaN\b/g, 'null')
    .replace(/\bInfinity\b/g, '1e308')
    .replace(/\b-Infinity\b/g, '-1e308');
  return JSON.parse(fixed);
}

/* ===== 颜色 ===== */
const TYPE_COLORS = {
  'MODEL':'#b07acc','CONDITIONING':'#c49a3c','LATENT':'#cc6699',
  'IMAGE':'#6495ed','VAE':'#cc4444','CLIP':'#cccc44',
  'CONTROL_NET':'#44cc88','MASK':'#66cccc','INT':'#6a9f6a',
  'FLOAT':'#6a9f6a','STRING':'#6a9faa','SAMPLER':'#cc8844',
  'SIGMAS':'#cc88cc','PIPE_LINE':'#7a7acc',
};
const PALETTE = ['#5a7fbb','#5a9e6f','#b49a3c','#b47a3c','#a85a6a','#7a6abf','#4a9a8a','#5a8ab0','#a07070','#7a7abf','#6a8a5a','#8a6a7a'];
function typeColor(t) { return TYPE_COLORS[t] || hashColor(t); }
function hashColor(t) { let h=0; for(let i=0;i<t.length;i++) h=((h<<5)-h+t.charCodeAt(i))|0; return PALETTE[Math.abs(h)%PALETTE.length]; }

/* ===== 全局 ===== */
let panX=0, panY=0, scale=1, selectedNodeId=null;
const viewport = document.getElementById('viewport');
const world = document.getElementById('world');
const svgEl = document.getElementById('links-svg');

function applyTransform() {
  world.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
}

function selectNode(nodeId) {
  world.querySelectorAll('.node.selected').forEach(el => el.classList.remove('selected'));
  selectedNodeId = nodeId;
  const nodeEl = world.querySelector(`.node[data-id="${nodeId}"]`);
  if (nodeEl) nodeEl.classList.add('selected');
  svgEl.classList.add('has-selection');
  svgEl.querySelectorAll('path').forEach(p => {
    p.classList.toggle('highlight', p.dataset.from == nodeId || p.dataset.to == nodeId);
  });
}

/* ===== 构建 widget 名称映射 ===== */
function buildWidgetNames(promptData, nodes) {
  const CTRL = new Set(['randomize','fixed','increment','decrement']);
  const map = {};
  nodes.forEach(n => {
    if (!n.widgets_values) return;
    const nameMap = {};
    const wv = n.widgets_values;
    const pNode = promptData?.[String(n.id)];
    // prompt 里非数组值 = widget 参数（最可靠的名称来源）
    const pEntries = pNode?.inputs
      ? Object.entries(pNode.inputs).filter(([,v]) => !Array.isArray(v))
      : [];

    if (pEntries.length > 0) {
      // 按值精确匹配 prompt key → widgets_values index
      const used = new Set();
      // pass 1: 精确匹配
      for (let i = 0; i < wv.length; i++) {
        if (wv[i] === null || wv[i] === undefined) continue;
        if (typeof wv[i] === 'string' && CTRL.has(wv[i])) continue;
        for (let j = 0; j < pEntries.length; j++) {
          if (used.has(j)) continue;
          const [pk, pv] = pEntries[j];
          if (wv[i] === pv || (typeof wv[i] === typeof pv && String(wv[i]) === String(pv))) {
            nameMap[i] = pk; used.add(j); break;
          }
        }
      }
      // pass 2: 用 workflow widget.name 补全连线的 widget（prompt 里是数组引用）
      const wfNames = (n.inputs || []).filter(inp => inp.widget).map(inp => inp.widget.name);
      for (const wn of wfNames) {
        if (Object.values(nameMap).includes(wn)) continue;
        // 找第一个未命名的 slot
        for (let i = 0; i < wv.length; i++) {
          if (nameMap[i]) continue;
          if (typeof wv[i] === 'string' && CTRL.has(wv[i])) continue;
          nameMap[i] = wn;
          if (i+1 < wv.length && typeof wv[i+1] === 'string' && CTRL.has(wv[i+1])) nameMap[i+1] = wn + '_ctrl';
          break;
        }
      }
      // pass 3: 未匹配的按顺序填充剩余 prompt key
      let nj = 0;
      for (let i = 0; i < wv.length; i++) {
        if (nameMap[i]) continue;
        if (typeof wv[i] === 'string' && CTRL.has(wv[i])) continue;
        while (nj < pEntries.length && used.has(nj)) nj++;
        if (nj < pEntries.length) { nameMap[i] = pEntries[nj][0]; used.add(nj); nj++; }
      }
    } else {
      // 无 prompt 数据，用 workflow inputs[].widget.name
      const wfNames = (n.inputs || []).filter(inp => inp.widget).map(inp => inp.widget.name);
      let ni = 0;
      for (let i = 0; i < wv.length && ni < wfNames.length; i++) {
        nameMap[i] = wfNames[ni]; ni++;
        if (i+1 < wv.length && typeof wv[i+1] === 'string' && CTRL.has(wv[i+1])) {
          i++; nameMap[i] = wfNames[ni-1] + '_ctrl';
        }
      }
    }
    map[n.id] = nameMap;
  });
  return map;
}

/* ===== 渲染 ===== */
let promptData = null;

function renderWorkflow(wf) {
  const nodes = wf.nodes || [], links = wf.links || [], groups = wf.groups || [];
  const nodeById = {};
  nodes.forEach(n => { nodeById[n.id] = n; });
  const wnames = buildWidgetNames(promptData, nodes);

  // 分组框
  groups.forEach(g => {
    const el = document.createElement('div');
    el.className = 'group-box';
    const b = g.bounding;
    el.style.left=b[0]+'px'; el.style.top=b[1]+'px'; el.style.width=b[2]+'px'; el.style.height=b[3]+'px';
    const col = g.color || '#555';
    el.style.borderColor = col;
    el.style.background = hexToRgba(col, 0.06);
    const t = document.createElement('div');
    t.className = 'group-title';
    t.style.color = col==='#444'?'#999':col;
    t.style.fontSize = (g.font_size||18)+'px';
    t.textContent = g.title||'';
    el.appendChild(t);
    world.appendChild(el);
  });

  // 节点
  const nodeEls = {};
  nodes.forEach(n => {
    const isCollapsed = n.flags?.collapsed;
    const isMuted = n.mode===2 || n.mode===4;
    const el = document.createElement('div');
    el.className = 'node' + (isCollapsed?' collapsed':'') + (isMuted?' muted':'');
    el.dataset.id = n.id;

    const x = Array.isArray(n.pos)?n.pos[0]:(n.pos?.['0']??0);
    const y = Array.isArray(n.pos)?n.pos[1]:(n.pos?.['1']??0);
    el.style.left = x+'px'; el.style.top = y+'px';

    const nodeW = Array.isArray(n.size)?n.size[0]:(n.size?.['0']??220);
    const nodeH = Array.isArray(n.size)?n.size[1]:(n.size?.['1']??0);
    el.style.width = nodeW+'px';
    el.dataset.minH = nodeH; // 存原始高度
    if (!isCollapsed && nodeH > 0) el.style.minHeight = nodeH+'px';

    const col = hashColor(n.type||'');
    const hdr = document.createElement('div');
    hdr.className = 'node-header';
    hdr.style.background = col;
    hdr.innerHTML = `<span>${esc(n.title||n.type||'?')}</span><span class="nid">#${n.id}</span>`;
    el.appendChild(hdr);

    // 始终创建 content（折叠的默认隐藏）
    const content = document.createElement('div');
    content.className = 'node-content';
    if (isCollapsed) content.style.display = 'none';

    const pureInputs = [];
    (n.inputs||[]).forEach(inp => { if(!inp.widget) pureInputs.push(inp); });
    const outputs = n.outputs||[];
    const maxPorts = Math.max(pureInputs.length, outputs.length);

    for (let i = 0; i < maxPorts; i++) {
      const row = document.createElement('div');
      row.className = 'port-row';
      const left = document.createElement('div');
      left.className = 'port-left';
      if (i < pureInputs.length) {
        const inp = pureInputs[i];
        const dot = document.createElement('span');
        dot.className = 'port-dot input' + (inp.link!=null?' connected':'');
        left.appendChild(dot);
        const lbl = document.createElement('span');
        lbl.textContent = inp.label || inp.name || '?';
        left.appendChild(lbl);
      }
      row.appendChild(left);
      const right = document.createElement('div');
      right.className = 'port-right';
      if (i < outputs.length) {
        const out = outputs[i];
        const lbl = document.createElement('span');
        lbl.textContent = out.label || out.name || '?';
        right.appendChild(lbl);
        const dot = document.createElement('span');
        dot.className = 'port-dot output' + (out.links?.length?' connected':'');
        right.appendChild(dot);
      }
      row.appendChild(right);
      content.appendChild(row);
    }

    if (n.widgets_values?.length) {
      const sec = document.createElement('div'); sec.className='widgets';
      const names = wnames[n.id] || {};
      n.widgets_values.forEach((v, i) => {
        if (v===null||v===undefined) return;
        const s = typeof v==='object'?JSON.stringify(v):String(v);
        if (s===''||s==='false') return;
        const row = document.createElement('div'); row.className='widget-row';
        row.dataset.widgetName = names[i] || '';
        const label = names[i] || ('w'+i);
        row.innerHTML = `<span class="wk">${esc(label)}</span><span class="wv">${esc(s)}</span>`;
        sec.appendChild(row);
      });
      if (sec.children.length) content.appendChild(sec);
    }

    el.appendChild(content);

    if (!isCollapsed) {
      requestAnimationFrame(() => {
        const contentH = content.scrollHeight;
        const availH = Math.max(nodeH - 28, 40);
        if (contentH > availH && availH > 0) {
          const ratio = Math.max(availH / contentH, 0.55);
          content.style.fontSize = Math.max(ratio * 13, 8) + 'px';
        } else if (contentH < availH * 0.5 && availH > 60) {
          const ratio = Math.min(availH / Math.max(contentH, 1), 2.0);
          content.style.fontSize = Math.min(ratio * 13, 22) + 'px';
        }
      });
    }

    world.appendChild(el);
    nodeEls[n.id] = el;
  });

  // 画连线 - 等字体缩放完成后
  _linksData = links; _nodeById = nodeById; _nodeEls = nodeEls;
  requestAnimationFrame(() => requestAnimationFrame(() => requestAnimationFrame(() => {
    drawLinks(links, nodeById, nodeEls);
    fitView();
  })));

  document.getElementById('info').textContent = `节点: ${nodes.length} | 连接: ${links.length} | 分组: ${groups.length} · 点击标题高亮连线`;
  document.getElementById('info').classList.add('active');
}

let _linksData, _nodeById, _nodeEls;
function redrawLinks() {
  if(_linksData) drawLinks(_linksData, _nodeById, _nodeEls);
}
function restoreHighlight() {
  if(selectedNodeId != null) {
    svgEl.classList.add('has-selection');
    svgEl.querySelectorAll('path').forEach(p => {
      p.classList.toggle('highlight', p.dataset.from == selectedNodeId || p.dataset.to == selectedNodeId);
    });
  }
}

function drawLinks(links, nodeById, nodeEls) {
  let paths = '';
  links.forEach(l => {
    const [linkId, fromId, fromSlot, toId, toSlot, linkType] = l;
    const fromEl = nodeEls[fromId], toEl = nodeEls[toId];
    if (!fromEl || !toEl) return;
    const fromNode = nodeById[fromId], toNode = nodeById[toId];
    let x1, y1, x2, y2;

    // 输出端
    const fromContent = fromEl.querySelector('.node-content');
    const fromIsCollapsed = !fromContent || fromContent.style.display === 'none';
    if (fromIsCollapsed) {
      x1 = fromEl.offsetLeft + fromEl.offsetWidth;
      y1 = fromEl.offsetTop + fromEl.offsetHeight/2;
    } else {
      x1 = fromEl.offsetLeft + fromEl.offsetWidth;
      const outDots = fromEl.querySelectorAll('.port-dot.output');
      if (outDots[fromSlot]) {
        const dot = outDots[fromSlot];
        y1 = fromEl.offsetTop + getOffsetTop(dot, fromEl) + dot.offsetHeight/2;
      } else {
        y1 = fromEl.offsetTop + 28 + fromSlot*20 + 10;
      }
    }

    // 输入端
    const toContent = toEl.querySelector('.node-content');
    const toIsCollapsed = !toContent || toContent.style.display === 'none';
    if (toIsCollapsed) {
      x2 = toEl.offsetLeft;
      y2 = toEl.offsetTop + toEl.offsetHeight/2;
    } else {
      x2 = toEl.offsetLeft;
      const toInput = toNode.inputs?.[toSlot];
      if (toInput?.widget) {
        // widget 输入 - 找到对应的 widget 行
        const wName = toInput.widget.name;
        const wRow = toEl.querySelector(`.widget-row[data-widget-name="${wName}"]`);
        if (wRow) {
          y2 = toEl.offsetTop + getOffsetTop(wRow, toEl) + wRow.offsetHeight/2;
        } else {
          y2 = toEl.offsetTop + 28;
        }
      } else {
        // 找到在纯输入列表中的索引
        let pureIdx = 0;
        for (let i=0; i<toSlot; i++) { if(!toNode.inputs?.[i]?.widget) pureIdx++; }
        const inDots = toEl.querySelectorAll('.port-dot.input');
        if (inDots[pureIdx]) {
          const dot = inDots[pureIdx];
          y2 = toEl.offsetTop + getOffsetTop(dot, toEl) + dot.offsetHeight/2;
        } else {
          y2 = toEl.offsetTop + 28 + toSlot*20 + 10;
        }
      }
    }

    const dx = Math.max(Math.abs(x2-x1)*0.35, 40);
    const col = typeColor(linkType||'*');
    paths += `<path d="M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}" stroke="${col}" stroke-width="2.5" fill="none" opacity="0.75" data-from="${fromId}" data-to="${toId}" data-link="${linkId}"/>`;
  });
  svgEl.innerHTML = paths;
}

// 递归计算元素相对于祖先的 offsetTop
function getOffsetTop(el, ancestor) {
  let top = 0;
  let cur = el;
  while (cur && cur !== ancestor) {
    top += cur.offsetTop;
    cur = cur.offsetParent;
    if (cur === ancestor) break;
    // offsetParent 可能跳过中间层
  }
  return top;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function hexToRgba(hex,a) {
  hex=hex.replace('#','');
  if(hex.length===3) hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  return `rgba(${parseInt(hex.substring(0,2),16)},${parseInt(hex.substring(2,4),16)},${parseInt(hex.substring(4,6),16)},${a})`;
}

function resetView() { panX=0;panY=0;scale=1;applyTransform(); }
function fitView() {
  const els=world.querySelectorAll('.node');
  if(!els.length) return;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  els.forEach(el => {
    minX=Math.min(minX,el.offsetLeft); minY=Math.min(minY,el.offsetTop);
    maxX=Math.max(maxX,el.offsetLeft+el.offsetWidth); maxY=Math.max(maxY,el.offsetTop+el.offsetHeight);
  });
  const pad=80,w=maxX-minX+pad*2,h=maxY-minY+pad*2;
  scale=Math.min(window.innerWidth/w,window.innerHeight/h,1.5);
  panX=(window.innerWidth-w*scale)/2-minX*scale+pad*scale;
  panY=(window.innerHeight-h*scale)/2-minY*scale+pad*scale;
  applyTransform();
}

let drag=false,dx0,dy0,startX,startY,didMove,clickedNodeId=null,clickedHeader=false;
let dragNodeEl=null, dragNodeStartX, dragNodeStartY; // 节点拖拽

viewport.addEventListener('pointerdown', e => {
  if(e.target.closest('#toolbar')) return;
  const nodeEl = e.target.closest('.node');
  clickedNodeId = nodeEl ? nodeEl.dataset.id : null;
  clickedHeader = !!e.target.closest('.node-header');
  startX=e.clientX; startY=e.clientY;
  didMove=false;

  // 选择模式下点节点内容不启动拖拽
  if(currentMode==='select' && nodeEl && !clickedHeader) return;

  drag=true;
  dx0=e.clientX-panX; dy0=e.clientY-panY;

  // 如果点了节点且是移动模式，准备拖节点
  if(nodeEl && currentMode==='move') {
    dragNodeEl = nodeEl;
    dragNodeStartX = nodeEl.offsetLeft;
    dragNodeStartY = nodeEl.offsetTop;
  }

  viewport.classList.add('dragging');
  viewport.setPointerCapture(e.pointerId);
});

viewport.addEventListener('pointermove', e => {
  if(!drag) return;
  const mx=Math.abs(e.clientX-startX), my=Math.abs(e.clientY-startY);
  if(mx>3||my>3) didMove=true;
  if(!didMove) return;

  if(dragNodeEl) {
    // 拖动节点
    const dx=(e.clientX-startX)/scale, dy=(e.clientY-startY)/scale;
    dragNodeEl.style.left = (dragNodeStartX+dx)+'px';
    dragNodeEl.style.top = (dragNodeStartY+dy)+'px';
  } else {
    // 拖动画布
    panX=e.clientX-dx0; panY=e.clientY-dy0;
    applyTransform();
  }
});

viewport.addEventListener('pointerup', e => {
  drag=false; viewport.classList.remove('dragging');

  if(dragNodeEl && didMove) {
    redrawLinks();
    restoreHighlight();
  }

  if(!didMove) {
    if(clickedNodeId) {
      selectNode(parseInt(clickedNodeId));
      if(clickedHeader) {
        const el = world.querySelector(`.node[data-id="${clickedNodeId}"]`);
        const content = el?.querySelector('.node-content');
        if(content) {
          const hiding = content.style.display !== 'none';
          content.style.display = hiding ? 'none' : '';
          el.classList.toggle('collapsed', hiding);
          if(hiding) {
            el.style.minHeight = '';
          } else {
            const h = el.dataset.minH;
            if(h && +h > 0) el.style.minHeight = h + 'px';
          }
          // 折叠/展开后重绘连线并恢复高亮
          requestAnimationFrame(() => {
            redrawLinks();
            restoreHighlight();
          });
        }
      }
    } else {
      selectedNodeId=null;
      world.querySelectorAll('.node.selected').forEach(el=>el.classList.remove('selected'));
      svgEl.classList.remove('has-selection');
      svgEl.querySelectorAll('path').forEach(p=>p.classList.remove('highlight'));
    }
  }
  clickedNodeId=null; clickedHeader=false; dragNodeEl=null;
});
viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const f=e.deltaY>0?0.9:1.1, ns=Math.max(0.02,Math.min(8,scale*f));
  panX=e.clientX-(e.clientX-panX)*(ns/scale);
  panY=e.clientY-(e.clientY-panY)*(ns/scale);
  scale=ns; applyTransform();
}, {passive:false});

function loadFile(file) {
  if(file.name.endsWith('.json')){
    file.text().then(t=>{try{promptData=null;show(JSON.parse(t));}catch(e){alert('JSON 解析失败: '+e.message);}});
    return;
  }
  const r=new FileReader();
  r.onload=()=>{
    try{
      const m = file.name.endsWith('.webp') ? parseWebpMeta(r.result) : parsePngMeta(r.result);
      // WebUI 格式：有 parameters 字段，无 workflow/prompt
      if(m.parameters && !m.workflow && !m.prompt){
        showWebUI(m.parameters); return;
      }
      promptData = m.prompt ? safeJsonParse(m.prompt) : null;
      let wf=m.workflow?safeJsonParse(m.workflow):promptData?promptToWf(promptData):null;
      if(!wf){alert('未找到工作流信息');return;}
      show(wf);
    }catch(e){alert('解析失败: '+e.message);console.error(e);}
  };
  r.readAsArrayBuffer(file);
}

function showWebUI(raw) {
  const lines = raw.split('\n');
  const negIdx = lines.findIndex(l => l.startsWith('Negative prompt:'));
  const paramIdx = lines.findIndex(l => l.startsWith('Steps:'));
  let pos = '', neg = '', params = '';
  if (negIdx !== -1) {
    pos = lines.slice(0, negIdx).join('\n');
    neg = lines.slice(negIdx, paramIdx !== -1 ? paramIdx : lines.length).join('\n').replace('Negative prompt:', '').trim();
  } else if (paramIdx !== -1) {
    pos = lines.slice(0, paramIdx).join('\n');
  } else { pos = raw; }
  if (paramIdx !== -1) params = lines.slice(paramIdx).join('\n');
  const extract = k => { const m = params.match(new RegExp(k + ':\\s*([^,]+)')); return m ? m[1].trim() : ''; };
  const out = ['# WebUI (A1111) 生成信息', ''];
  out.push('## 参数');
  for (const [label, key] of [['Model', 'Model'], ['Steps', 'Steps'], ['Sampler', 'Sampler'], ['Schedule', 'Schedule type'], ['CFG', 'CFG scale'], ['Seed', 'Seed'], ['Size', 'Size'], ['Denoise', 'Denoising strength'], ['Clip skip', 'Clip skip'], ['Model hash', 'Model hash']]) {
    const v = extract(key); if (v && v !== '??') out.push(`  ${label}: ${v}`);
  }
  out.push('', '## 正向提示词', pos.trim(), '', '## 负向提示词', neg.trim() || '(无)');
  // LoRA/Hires 等额外参数
  const extras = params.replace(/^Steps:.*$/, '').trim();
  if (extras) { out.push('', '## 原始参数', params.trim()); }
  dropZone.classList.add('hidden');
  document.getElementById('summary-text').value = out.join('\n');
  document.getElementById('summary-overlay').classList.add('active');
}

function promptToWf(prompt) {
  const nodes=[],links=[];let lid=1;
  const entries=Object.entries(prompt), cols=Math.ceil(Math.sqrt(entries.length));
  entries.forEach(([id,data],idx)=>{
    const node={id:+id,type:data.class_type,title:data._meta?.title,pos:[(idx%cols)*350,Math.floor(idx/cols)*280],size:[280,150],inputs:[],outputs:[],widgets_values:[],properties:{}};
    if(data.inputs){
      Object.entries(data.inputs).forEach(([k,v])=>{
        if(Array.isArray(v)){node.inputs.push({name:k,type:'*',link:lid});links.push([lid,+v[0],v[1],+id,node.inputs.length-1,'*']);lid++;}
        else{node.widgets_values.push(v);node.properties[k]=v;}
      });
    }
    nodes.push(node);
  });
  return {nodes,links,groups:[]};
}

let _currentWf = null; // 存储当前工作流数据

function generateSummary() {
  if (!_currentWf) { alert('请先加载工作流'); return; }
  const wf = _currentWf;
  const nodes = wf.nodes || [], links = wf.links || [], groups = wf.groups || [];
  const linkMap = {}; links.forEach(l => { linkMap[l[0]] = l; });
  const nodeMap = {}; nodes.forEach(n => { nodeMap[n.id] = n; });
  const wnameMaps = buildWidgetNames(promptData, nodes);

  // 判断节点执行状态：prompt 里有的才是真正执行的
  const promptIds = promptData ? new Set(Object.keys(promptData)) : new Set();
  const linkedIds = new Set();
  links.forEach(l => { linkedIds.add(l[1]); linkedIds.add(l[3]); });

  function nodeStatus(n) {
    if (n.mode === 2 || n.mode === 4) return 'disabled';
    if (promptIds.has(String(n.id))) return 'active';
    // get/set 路由节点有连线算 active
    if (linkedIds.has(n.id) && /[gs]et\s*node/i.test(n.type || '')) return 'active';
    if (linkedIds.has(n.id)) return 'idle'; // 有连线但没执行（被旁路等）
    return 'idle'; // 无连线，闲置
  }

  // 计算每个节点所属分组
  const nodeGroup = {};
  groups.forEach(g => {
    const [gx, gy, gw, gh] = g.bounding;
    nodes.forEach(n => {
      const [nx, ny] = Array.isArray(n.pos) ? n.pos : [0,0];
      if (nx >= gx && nx <= gx+gw && ny >= gy && ny <= gy+gh) {
        if (!nodeGroup[n.id] || (gw * gh < nodeGroup[n.id].area))
          nodeGroup[n.id] = { name: g.title, area: gw * gh };
      }
    });
  });

  function formatNode(n, showStatus) {
    const out = [];
    const title = n.title || '';
    const ntype = n.type || '?';
    let hdr = `[#${n.id}] ${ntype}`;
    if (title && title !== ntype) hdr += ` "${title}"`;
    const st = nodeStatus(n);
    if (showStatus && st === 'disabled') hdr += ' (已禁用)';
    if (showStatus && st === 'idle') hdr += ' (未执行)';
    const g = nodeGroup[n.id];
    if (g) hdr += ` [${g.name}]`;
    out.push(hdr);

    (n.inputs||[]).forEach(inp => {
      if (inp.widget) return;
      const lid = inp.link;
      if (!lid || !linkMap[lid]) return;
      const l = linkMap[lid];
      const fn = nodeMap[l[1]];
      if (!fn) return;
      const ft = fn.title || fn.type || '?';
      const fo = fn.outputs || [];
      const on = l[2] < fo.length ? fo[l[2]].name : '?';
      out.push(`  ← ${inp.label||inp.name}: #${l[1]} ${ft}.${on}`);
    });

    (n.outputs||[]).forEach(o => {
      if (!o.links?.length) return;
      const targets = o.links.map(lid => {
        const l = linkMap[lid]; if (!l) return null;
        const tn = nodeMap[l[3]]; if (!tn) return null;
        const ti = tn.inputs || [];
        const iname = l[4] < ti.length ? (ti[l[4]].label||ti[l[4]].name) : '?';
        return `#${l[3]}.${iname}`;
      }).filter(Boolean);
      if (targets.length) out.push(`  → ${o.label||o.name}: ${targets.join(' | ')}`);
    });

    const wmap = wnameMaps[n.id] || {};
    const vals = n.widgets_values || [];
    const params = [];
    vals.forEach((v, i) => {
      if (v === null || v === undefined || v === '' || v === false) return;
      if (typeof v === 'string' && ['randomize','fixed','increment','decrement'].includes(v)) return;
      const name = wmap[i] || ('w'+i);
      if (name.endsWith('_ctrl')) return;
      let sv = typeof v === 'object' ? JSON.stringify(v) : String(v);
      params.push(`${name}=${sv}`);
    });
    if (params.length) out.push(`  参数: ${params.join(', ')}`);
    return out.join('\n');
  }

  const sorted = [...nodes].sort((a,b) => (a.order||999) - (b.order||999));
  const activeNodes = sorted.filter(n => nodeStatus(n) === 'active');
  const idleNodes = sorted.filter(n => nodeStatus(n) === 'idle');
  const disabledNodes = sorted.filter(n => nodeStatus(n) === 'disabled');

  const lines = [];
  lines.push(`# ComfyUI 工作流 (${nodes.length} 节点: ${activeNodes.length} 执行, ${idleNodes.length} 闲置, ${disabledNodes.length} 禁用)`);
  lines.push('');

  // 实际执行的节点 — 按分组输出
  lines.push('# ===== 实际执行的节点 =====');
  lines.push('');
  const groupNames = groups.filter(g=>g.title).map(g=>g.title);
  const ungrouped = [];
  const grouped = {};
  groupNames.forEach(g => { grouped[g] = []; });
  activeNodes.forEach(n => {
    const g = nodeGroup[n.id];
    if (g && grouped[g.name]) grouped[g.name].push(n);
    else ungrouped.push(n);
  });
  groupNames.forEach(gname => {
    if (!grouped[gname].length) return;
    lines.push(`## ${gname}`);
    grouped[gname].forEach(n => { lines.push(formatNode(n, false)); lines.push(''); });
  });
  if (ungrouped.length) {
    if (groupNames.length) lines.push('## 未分组');
    ungrouped.forEach(n => { lines.push(formatNode(n, false)); lines.push(''); });
  }

  // 闲置节点（简要列出）
  if (idleNodes.length) {
    lines.push('# ===== 闲置节点（未连接/未执行，不影响出图）=====');
    lines.push('');
    idleNodes.forEach(n => { lines.push(formatNode(n, true)); lines.push(''); });
  }

  // 禁用节点（简要列出）
  if (disabledNodes.length) {
    lines.push('# ===== 已禁用节点 =====');
    lines.push('');
    disabledNodes.forEach(n => { lines.push(formatNode(n, true)); lines.push(''); });
  }

  document.getElementById('summary-text').value = lines.join('\n');
  document.getElementById('summary-overlay').classList.add('active');
}

}

function resetToDropZone() {
  _currentWf = null; promptData = null;
  document.getElementById('mode-select').classList.remove('active');
  document.getElementById('summary-overlay').classList.remove('active');
  viewport.classList.remove('active');
  document.getElementById('toolbar').classList.remove('active');
  dropZone.classList.remove('hidden');
}

function show(wf) {
  _currentWf = wf;
  dropZone.classList.add('hidden');
  // 显示模式选择界面
  document.getElementById('mode-select').classList.add('active');
}

function doShowGraph() {
  document.getElementById('mode-select').classList.remove('active');
  viewport.classList.add('active');
  document.getElementById('toolbar').classList.add('active');
  renderWorkflow(_currentWf);
}

function doShowText() {
  document.getElementById('mode-select').classList.remove('active');
  generateSummary();
  // 摘要关闭后显示"返回"选项
  const overlay = document.getElementById('summary-overlay');
  const origClose = overlay.querySelector('.btns');
  // 加一个"查看工作流视图"按钮（如果还没加过）
  if (!origClose.querySelector('.to-graph')) {
    const btn = document.createElement('button');
    btn.className = 'to-graph';
    btn.textContent = '查看工作流视图';
    btn.onclick = () => { overlay.classList.remove('active'); doShowGraph(); };
    origClose.insertBefore(btn, origClose.firstChild);
  }
}
</script>
</body>
</html>
